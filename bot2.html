        let selectedHomeTeam = null;
        let selectedAwayTeam = null;
        let currentPrediction = null;

        class EnhancedFootballAI {
            constructor() {
                this.weights = { position: 0.20, recentForm: 0.15, homeAdvantage: 0.10, goalsScored: 0.12, goalsConceded: 0.08, consistency: 0.05, oddsInfluence: 0.30 };
                this.scoringPatterns = { 
                    highFavorite: { homeRange: [7, 11], awayRange: [3, 6], drawProb: 0.10 }, 
                    favorite: { homeRange: [6, 9], awayRange: [4, 7], drawProb: 0.15 }, 
                    moderate: { homeRange: [5, 8], awayRange: [5, 8], drawProb: 0.20 }, 
                    balanced: { homeRange: [5, 7], awayRange: [5, 7], drawProb: 0.25 }, 
                    underdog: { homeRange: [4, 6], awayRange: [7, 10], drawProb: 0.18 } 
                };
            }
            
            // NEW HELPER FUNCTION for more realistic score generation
            probabilisticRound(value) {
                const floor = Math.floor(value);
                const decimal = value - floor;
                return floor + (Math.random() < decimal ? 1 : 0);
            }

            calculateOddsProbabilities(oddsHome, oddsDraw, oddsAway) { 
                const probHome = 1 / oddsHome; 
                const probDraw = 1 / oddsDraw; 
                const probAway = 1 / oddsAway; 
                const total = probHome + probDraw + probAway; 
                return { 
                    home: (probHome / total) * 100, 
                    draw: (probDraw / total) * 100, 
                    away: (probAway / total) * 100, 
                    margin: ((total - 1) * 100) 
                }; 
            }
            
            getOddsCategory(odds) { 
                if (odds < 1.5) return 'highFavorite'; 
                if (odds < 2.0) return 'favorite'; 
                if (odds < 3.0) return 'moderate'; 
                if (odds < 4.0) return 'balanced'; 
                return 'underdog'; 
            }
            
            calculateTeamStrength(team, isHome = false) { 
                const positionStrength = (21 - team.position) / 20; 
                const formScore = team.recentForm.reduce((sum, result) => sum + result, 0) / 5; 
                let strength = (positionStrength * this.weights.position + formScore * this.weights.recentForm + (team.attacking / 100) * this.weights.goalsScored + (team.defending / 100) * this.weights.goalsConceded + (team.consistency / 100) * this.weights.consistency); 
                if (isHome) { 
                    strength += (team.homeWins / (team.homeWins + team.homeDraw + team.homeLoss)) * this.weights.homeAdvantage; 
                } 
                return Math.max(0.1, Math.min(1.0, strength)); 
            }
            
            // UPDATED PREDICTION LOGIC
            predictMatchWithOddsIntegration(homeTeam, awayTeam, oddsHome, oddsDraw, oddsAway) { 
                const homeStrength = this.calculateTeamStrength(homeTeam, true); 
                const awayStrength = this.calculateTeamStrength(awayTeam, false); 
                const oddsProbabilities = this.calculateOddsProbabilities(oddsHome, oddsDraw, oddsAway); 
                
                // NEW: 'Match Rhythm' factor to simulate game flow (0.9 to 1.1 multiplier)
                const matchRhythm = 1 + (Math.random() - 0.5) * 0.2;

                const baseHomeGoals = this.calculateBaseExpectedGoals(homeTeam, awayTeam, true) * matchRhythm; 
                const baseAwayGoals = this.calculateBaseExpectedGoals(awayTeam, homeTeam, false) * matchRhythm; 
                
                const oddsAdjustmentFactor = 0.7; 
                const homeOddsMultiplier = 1 + ((100 - oddsProbabilities.home) / 100 - 0.5) * oddsAdjustmentFactor; 
                const awayOddsMultiplier = 1 + ((100 - oddsProbabilities.away) / 100 - 0.5) * oddsAdjustmentFactor; 
                
                let adjustedHomeGoals = baseHomeGoals * homeOddsMultiplier; 
                let adjustedAwayGoals = baseAwayGoals * awayOddsMultiplier; 
                
                const pattern = this.getScoringPattern(oddsHome, oddsAway, oddsDraw); 
                adjustedHomeGoals = this.applyPatternToGoals(adjustedHomeGoals, pattern.homeRange); 
                adjustedAwayGoals = this.applyPatternToGoals(adjustedAwayGoals, pattern.awayRange); 
                
                // UPDATED: Use probabilistic rounding for more varied and realistic scores
                let homeScore = this.probabilisticRound(adjustedHomeGoals); 
                let awayScore = this.probabilisticRound(adjustedAwayGoals); 
                
                // UPDATED: More dynamic draw logic based on expected goals
                if (oddsProbabilities.draw > 30 && Math.random() < 0.75) { // 75% chance to force a draw if odds are high
                    const avgGoals = this.probabilisticRound((adjustedHomeGoals + adjustedAwayGoals) / 2);
                    homeScore = avgGoals; 
                    awayScore = avgGoals; 
                } 
                
                homeScore = Math.max(0, Math.min(15, homeScore)); 
                awayScore = Math.max(0, Math.min(15, awayScore)); 
                
                const confidence = this.calculateOddsBasedConfidence(homeStrength, awayStrength, oddsProbabilities, homeScore, awayScore); 
                return { homeScore, awayScore, confidence, oddsProbabilities }; 
            }
            
            calculateBaseExpectedGoals(team, opponent, isHome) { 
                const leagueAvg = isHome ? 7.5 : 6.5; 
                const attackStrength = (team.goalsFor / team.played) / leagueAvg; 
                const opponentDefenseStrength = (opponent.goalsAgainst / opponent.played) / leagueAvg; 
                return leagueAvg * attackStrength * opponentDefenseStrength; 
            }
            
            getScoringPattern(oddsHome, oddsAway, oddsDraw) { 
                const homeCategory = this.getOddsCategory(oddsHome); 
                const awayCategory = this.getOddsCategory(oddsAway); 
                if (oddsHome < oddsAway) { 
                    return this.scoringPatterns[homeCategory]; 
                } else if (oddsAway < oddsHome) { 
                    return { 
                        homeRange: this.scoringPatterns[awayCategory].awayRange, 
                        awayRange: this.scoringPatterns[awayCategory].homeRange, 
                        drawProb: this.scoringPatterns[awayCategory].drawProb 
                    }; 
                } else { 
                    return this.scoringPatterns.balanced; 
                } 
            }
            
            applyPatternToGoals(baseGoals, range) { 
                const [min, max] = range; 
                return Math.min(max, Math.max(min, baseGoals)); 
            }
            
            calculateOddsBasedConfidence(homeStrength, awayStrength, oddsProbabilities, homeScore, awayScore) { 
                const strengthDiff = Math.abs(homeStrength - awayStrength); 
                let baseConfidence = 60 + (strengthDiff * 30); 
                const predictedOutcome = homeScore > awayScore ? 'home' : awayScore > homeScore ? 'away' : 'draw'; 
                const outcomeProb = oddsProbabilities[predictedOutcome]; 
                const consistencyBonus = outcomeProb / 100 * 20; 
                const marginPenalty = oddsProbabilities.margin * 0.3; 
                return Math.min(95, Math.max(55, baseConfidence + consistencyBonus - marginPenalty)); 
            }
        }

                awayTeamsContainer.appendChild(createEnhancedTeamCard(team, 'away'));
            });

        function createEnhancedTeamCard(team, type) {
            const card = document.createElement('div');
            card.className = 'team-card bg-white bg-opacity-20 rounded-lg p-2 text-white cursor-pointer transition-all duration-300 text-xs';
            card.innerHTML = `<div class=&quot;font-semibold truncate&quot;>${team.name}</div><div class=&quot;opacity-75&quot;>#${team.position} - ${team.points}pts</div>`;
            card.addEventListener('click', () => selectTeam(team, type, card));
            return card;
        }

        function selectTeam(team, type, cardElement) {
            const containerId = type === 'home' ? '#home-teams' : '#away-teams';
            document.querySelectorAll(`${containerId} .team-card`).forEach(card => card.classList.remove('selected'));
            if (type === 'home') selectedHomeTeam = team; 
            else selectedAwayTeam = team;
            cardElement.classList.add('selected');
            updateMatchPreview();
        }

        function updateMatchPreview() {
            if (selectedHomeTeam && selectedAwayTeam) {
                document.getElementById('match-preview').classList.remove('hidden');
                document.getElementById('home-team-display').textContent = selectedHomeTeam.name;
                document.getElementById('away-team-display').textContent = selectedAwayTeam.name;
            }

        function populateEnhancedStandings() {

                tbody.appendChild(row);
            });
        }

        function setupEventListeners() {
            document.querySelectorAll('[id^=&quot;tab-&quot;]').forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.id.split('-')[1]));
            });
            document.getElementById('predict-btn').addEventListener('click', makeEnhancedAIPrediction);
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
            document.querySelectorAll('[id^=&quot;tab-&quot;]').forEach(tab => tab.classList.remove('tab-active'));
            document.getElementById(`content-${tabName}`).classList.remove('hidden');
            document.getElementById(`tab-${tabName}`).classList.add('tab-active');
            if (tabName === 'analysis' && currentPrediction) updateAnalysisCharts();
        }

        function makeEnhancedAIPrediction() {
            if (!selectedHomeTeam || !selectedAwayTeam) { 
                alert('⚠️ Veuillez sélectionner les deux équipes.'); 
                return; 
            }
            if (selectedHomeTeam.name === selectedAwayTeam.name) { 
                alert('⚠️ Une équipe ne peut pas jouer contre elle-même.'); 
                return; 
            }
            const oddsHome = parseFloat(document.getElementById('odds-home').value);
            const oddsDraw = parseFloat(document.getElementById('odds-draw').value);
            const oddsAway = parseFloat(document.getElementById('odds-away').value);
            if (!oddsHome || !oddsDraw || !oddsAway || oddsHome < 1.01 || oddsDraw < 1.01 || oddsAway < 1.01) { 
                alert('⚠️ Veuillez saisir des cotes valides (minimum 1.01).'); 
                return; 
            }
            
            showAIProcessing();
            setTimeout(() => {
                const prediction = enhancedAI.predictMatchWithOddsIntegration(selectedHomeTeam, selectedAwayTeam, oddsHome, oddsDraw, oddsAway);
                currentPrediction = { 
                    ...prediction, 
                    homeTeam: selectedHomeTeam.name, 
                    awayTeam: selectedAwayTeam.name, 
                    timestamp: new Date(), 
                    odds: { home: oddsHome, draw: oddsDraw, away: oddsAway } 
                };
                displayEnhancedPredictionResults(currentPrediction);
                savePredictionToHistory(currentPrediction);
                hideAIProcessing();
            }, 2000);
        }

            document.getElementById('predict-btn').disabled = true;
            document.getElementById('ai-processing').classList.remove('hidden');

        }

            document.getElementById('predict-btn').disabled = false;
            document.getElementById('ai-processing').classList.add('hidden');

            document.getElementById('confidence-percentage').textContent = `${Math.round(prediction.confidence)}%`;

            predictionHistory.unshift(prediction);
            if (predictionHistory.length > 5) predictionHistory.pop();
            updateHistoryDisplay();
        }

            const historyContainer = document.getElementById('predictions-history');

            historyContainer.innerHTML = '';

            });
        }

                awayTeam.recentForm.reduce((s,r)=>s+r,0)*20, 
                60, 
                awayTeam.consistency
            ];
            performanceChart.update();
        }
